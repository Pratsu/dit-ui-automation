name: Manual Test Execution

on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Select Test Suite"
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - sanity
          - regression

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run Selected Test Suite
        run: |
          mvn clean test \
          -DsuiteXmlFile=src/test/resources/suites/testng-${{ github.event.inputs.suite }}.xml \
          -Dheadless=true

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: test-output/screenshots/

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testng-reports
          path: test-output/